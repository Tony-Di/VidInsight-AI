name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------- Backend: Spring Boot + Maven ----------
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-insight-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build
        # NOTE: tests are skipped for now because the only test (contextLoads)
        # boots the full Spring context, which eagerly connects to Redis /
        # RabbitMQ / MySQL. Once Testcontainers-based tests land, drop -DskipTests.
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp clean package -DskipTests

  # ---------- Frontend: React + Vite ----------
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-insight-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: video-insight-frontend/package-lock.json
      - run: npm ci
      - name: Build (type-check + bundle)
        run: npm run build
