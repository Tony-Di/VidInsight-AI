name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------- Backend: Spring Boot + Maven ----------
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-insight-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        # Runs the Testcontainers *IT integration tests via Failsafe (`verify`
        # phase). The ubuntu-latest runner ships Docker, so the Redis + MySQL
        # containers start with no extra CI setup.
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp clean verify

  # ---------- Frontend: React + Vite ----------
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-insight-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: video-insight-frontend/package-lock.json
      - run: npm ci
      - name: Build (type-check + bundle)
        run: npm run build
