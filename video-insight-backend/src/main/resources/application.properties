spring.application.name=video-insight-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=jdbc:mysql://localhost:3306/video_insight?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.default-requeue-rejected=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=500MB

app.rabbitmq.video-analysis-exchange=${VIDEO_ANALYSIS_EXCHANGE:video.analysis.exchange}
app.rabbitmq.video-analysis-queue=${VIDEO_ANALYSIS_QUEUE:video.analysis.v2.queue}
app.rabbitmq.video-analysis-routing-key=${VIDEO_ANALYSIS_ROUTING_KEY:video.analysis}
app.rabbitmq.dlx=${VIDEO_ANALYSIS_DLX:video.analysis.dlx}
app.rabbitmq.dlq=${VIDEO_ANALYSIS_DLQ:video.analysis.dlq}
app.rabbitmq.dlq-routing-key=${VIDEO_ANALYSIS_DLQ_ROUTING_KEY:video.analysis.dead}

app.upload.video-dir=uploads/videos
app.upload.chunk-dir=uploads/chunks
app.upload.audio-dir=uploads/audio
app.ffmpeg.path=${FFMPEG_PATH:ffmpeg}
app.storage.provider=${APP_STORAGE_PROVIDER:local}
app.ytdlp.path=${YT_DLP_PATH:yt-dlp}
app.ytdlp.ffmpeg-location=${YT_DLP_FFMPEG_LOCATION:}
app.ytdlp.download-timeout-minutes=${YT_DLP_DOWNLOAD_TIMEOUT_MINUTES:30}

ai.siliconflow.api-key=${SILICONFLOW_API_KEY:}
ai.siliconflow.base-url=https://api.siliconflow.cn/v1
ai.siliconflow.asr-model=TeleAI/TeleSpeechASR
ai.siliconflow.chat-model=deepseek-ai/DeepSeek-V4-Flash

# JWT
# 生产环境必须用环境变量覆盖。这里默认值仅用于本地开发,长度需 >= 32 字节(HS256 要求 >= 256 bit)。
app.jwt.secret=${APP_JWT_SECRET:vidinsight-local-dev-only-change-me-in-production-please}
app.jwt.expiration-hours=${APP_JWT_EXPIRATION_HOURS:24}
app.jwt.issuer=vidinsight-ai
