# Storage: force local so the S3/MinIO bean (@ConditionalOnProperty provider=s3) never loads.
app.storage.provider=local
app.upload.video-dir=build/test-uploads/videos
app.upload.chunk-dir=build/test-uploads/chunks
app.upload.audio-dir=build/test-uploads/audio

# JWT secret must be >= 32 bytes for HS256 key construction at context startup.
app.jwt.secret=test-only-secret-key-please-ignore-32bytes-minimum
app.jwt.expiration-hours=24
app.jwt.issuer=vidinsight-ai

# Load schema.sql into the Testcontainers MySQL on startup.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ffmpeg path is injected via @Value with no default into the always-scanned
# FfmpegMediaProcessingServiceImpl; must be present or the context fails to boot.
# Only referenced at runtime (extractAudio), which these tests never call.
app.ffmpeg.path=ffmpeg

# MyBatis-Plus: don't print the banner in test logs.
mybatis-plus.global-config.banner=false

# SiliconFlow key unused in these tests but referenced by config beans.
ai.siliconflow.api-key=test-unused
